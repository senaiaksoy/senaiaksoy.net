    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
        }

        body {
            display: grid;
            place-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Roboto, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: #f1f1f1;
        }

        a,
        a:visited,
        a:active {
            color: #0969da;
            text-decoration: none;
        }

        a:hover,
        a:focus {
            text-decoration: underline;
            text-underline-offset: 1px;
        }

        #cv {
            width: 100%;
            max-width: 360px;
            min-width: 320px;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f1f1f1;
        }

        header img {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            padding: 1rem;
        }

        .info {
            padding: 1rem 0;
        }

        .links {
            padding: 0;
            margin: 0;
            list-style-type: none;
        }

        .links li {
            list-style-type: none;
            padding: 0 1rem;
        }

        .links li a {
            display: flex;
            align-items: center;
            padding: .5rem;
            margin-bottom: .5rem;
            background-color: #f1f1f1;
            border-radius: 4px;
            transition: all .2s;
        }

        .links li a:hover,
        .links li a:focus {
            background-color: #e7e7e7;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15);
            transform: translateY(-2px);
            text-decoration: none;
        }

        .links li a span {
            display: block;
            color: #0096c7;
            padding: .25rem;
            font-size: .75rem;
            font-weight: 700;
            border-radius: 4px;
            margin-right: .5rem;
        }

        .links li a.web {
            background-color: transparent;
            padding: .5rem 0;
        }

        .links li a.web span {
            color: #555;
        }

        .links li a.web:first-child {
            margin-top: .5rem;
        }
    </style>
</head>
